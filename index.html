<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wh2sbvw7x2");
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopee App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      background-image: radial-gradient(ellipse at 20% 50%, #16213e 0%, #0f3460 50%, #533483 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .launcher {
      display: flex;
      align-items: flex-start;
      gap: 32px;
    }

    /* Phone frame */
    .phone {
      position: relative;
      width: 393px;
      height: 852px;
      background: #1c1c1e;
      border-radius: 54px;
      box-shadow:
        0 0 0 1px #3a3a3c,
        0 0 0 4px #2c2c2e,
        0 0 0 5px #1c1c1e,
        0 40px 120px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.08);
      padding: 14px;
      flex-shrink: 0;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      background: #000;
      border-radius: 42px;
      overflow: hidden;
      position: relative;
    }

    /* Dynamic island */
    .dynamic-island {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .dynamic-island::after {
      content: '';
      width: 10px;
      height: 10px;
      background: #1a1a1a;
      border-radius: 50%;
      border: 1px solid #2a2a2a;
    }

    /* Side buttons */
    .phone::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 140px;
      width: 4px;
      height: 36px;
      background: #3a3a3c;
      border-radius: 3px 0 0 3px;
      box-shadow: 0 50px 0 #3a3a3c, 0 100px 0 #3a3a3c;
    }

    .phone::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 185px;
      width: 4px;
      height: 80px;
      background: #3a3a3c;
      border-radius: 0 3px 3px 0;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 42px;
      display: block;
    }

    /* Screen nav panel */
    .nav-panel {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 20px 16px;
      width: 220px;
      align-self: center;
    }

    .nav-panel h3 {
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 12px;
      background: transparent;
      border: none;
      border-radius: 12px;
      color: rgba(255,255,255,0.65);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: left;
      margin-bottom: 2px;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }

    .nav-btn.active {
      background: linear-gradient(135deg, #EE4D2D, #ff7043);
      color: #fff;
      box-shadow: 0 4px 12px rgba(238,77,45,0.4);
    }

    .nav-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .nav-btn.active .nav-icon {
      background: rgba(255,255,255,0.2);
    }

    .divider {
      height: 1px;
      background: rgba(255,255,255,0.08);
      margin: 10px 0;
    }
  </style>
</head>
<body>

<div class="launcher">
  <!-- Screen selector -->
  <div class="nav-panel">
    <h3>Screens</h3>

    <button class="nav-btn active" onclick="loadScreen('home_screen/code.html', this)">
      <span class="nav-icon">🏠</span>
      Home
    </button>
    <button class="nav-btn" onclick="loadScreen('search_results_verified_refined/code.html', this)">
      <span class="nav-icon">🔍</span>
      Search Results
    </button>
    <button class="nav-btn" onclick="loadScreen('smart_search_filters/code.html', this)">
      <span class="nav-icon">🎛️</span>
      Search Filters
    </button>

    <div class="divider"></div>

    <button class="nav-btn" onclick="loadScreen('product_details/code.html', this)">
      <span class="nav-icon">📦</span>
      Product Details
    </button>
    <button class="nav-btn" onclick="loadScreen('product_comparison_view/code.html', this)">
      <span class="nav-icon">⚖️</span>
      Compare Products
    </button>

    <div class="divider"></div>

    <button class="nav-btn" onclick="loadScreen('shopping_cart/code.html', this)">
      <span class="nav-icon">🛒</span>
      Shopping Cart
    </button>
    <button class="nav-btn" onclick="loadScreen('checkout/code.html', this)">
      <span class="nav-icon">💳</span>
      Checkout
    </button>

    <div class="divider"></div>

    <button class="nav-btn" onclick="loadScreen('deals_loyalty_hub/code.html', this)">
      <span class="nav-icon">🎁</span>
      Deals & Loyalty
    </button>
    <button class="nav-btn" onclick="loadScreen('my_profile/code.html', this)">
      <span class="nav-icon">👤</span>
      My Profile
    </button>
  </div>

  <!-- Phone -->
  <div class="phone">
    <div class="phone-screen">
      <div class="dynamic-island"></div>
      <iframe id="screen" src="home_screen/code.html" title="Shopee App"></iframe>
    </div>
  </div>
</div>

<script>
  function loadScreen(src, btn) {
    document.getElementById('screen').src = src;
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
</script>

</body>
</html>
