        .hide-scrollbar::-webkit-scrollbar { display: none; }

<body class="bg-background text-on-background antialiased pb-24">
<!-- TopAppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center px-3 py-2 h-14 bg-white dark:bg-gray-950 border-b border-gray-100 dark:border-gray-800 shadow-sm font-['Plus_Jakarta_Sans'] antialiased">
<div class="flex items-center justify-between w-full">
<button class="p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors duration-200 ease-in-out rounded-full">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-h3 font-h3 flex-1 text-center">Filter</h1>
<button class="p-2 text-primary font-label-sm font-medium hover:bg-gray-50 dark:hover:bg-gray-900 transition-colors duration-200 ease-in-out rounded-full">
                Reset
            </button>
</div>
</header>
<main class="pt-14 px-margin-mobile">
<!-- Smart Defaults / Quick Filters -->
<section class="mt-md mb-lg">
<div class="flex overflow-x-auto hide-scrollbar gap-sm py-2">
<button class="flex items-center gap-xs px-4 py-2 bg-primary text-on-primary rounded-full font-label-sm whitespace-nowrap shadow-[0_2px_8px_rgba(178,34,4,0.15)] border border-primary">
<span class="material-symbols-outlined text-[16px]" data-icon="local_shipping">local_shipping</span>
                    Quick Delivery
                </button>
<button class="flex items-center gap-xs px-4 py-2 bg-surface-container-lowest text-on-surface border border-surface-variant rounded-full font-label-sm whitespace-nowrap shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-[16px] text-secondary-container" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
                    Top Rated
                </button>
<button class="flex items-center gap-xs px-4 py-2 bg-surface-container-lowest text-on-surface border border-surface-variant rounded-full font-label-sm whitespace-nowrap shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-[16px] text-green-600" data-icon="sell">sell</span>
                    Sale
                </button>
<button class="flex items-center gap-xs px-4 py-2 bg-surface-container-lowest text-on-surface border border-surface-variant rounded-full font-label-sm whitespace-nowrap shadow-[0_2px_8px_rgba(0,0,0,0.04)]">
<span class="material-symbols-outlined text-[16px]" data-icon="verified">verified</span>
                    Mall Brands
                </button>
</div>
</section>
<!-- Divider Block -->
<div class="h-2 bg-[#F5F5F5] -mx-margin-mobile mb-lg"></div>
<!-- Categories: Core Products -->
<section class="mb-lg">
<h2 class="text-h3 font-h3 mb-md">Kitchen Essentials</h2>
<div class="grid grid-cols-3 gap-sm">
<!-- Selected State -->
<div class="relative bg-primary-fixed text-on-primary-fixed-variant border-2 border-primary rounded-DEFAULT p-3 flex flex-col items-center justify-center text-center h-24">
<span class="material-symbols-outlined mb-1" data-icon="blender">blender</span>
<span class="font-label-sm text-label-sm leading-tight">Appliances</span>
<div class="absolute top-0 right-0 w-0 h-0 border-t-[20px] border-l-[20px] border-t-primary border-l-transparent"></div>
<span class="material-symbols-outlined absolute top-0 right-0 text-white text-[10px] -mt-[2px] -mr-[2px]" data-icon="check">check</span>
</div>
<!-- Unselected States -->
<div class="bg-surface-container-lowest text-on-surface border border-surface-variant rounded-DEFAULT p-3 flex flex-col items-center justify-center text-center h-24">
<span class="material-symbols-outlined mb-1 text-on-surface-variant" data-icon="skillet">skillet</span>
<span class="font-label-sm text-label-sm leading-tight">Cookware</span>
</div>
<div class="bg-surface-container-lowest text-on-surface border border-surface-variant rounded-DEFAULT p-3 flex flex-col items-center justify-center text-center h-24">
<span class="material-symbols-outlined mb-1 text-on-surface-variant" data-icon="kitchen">kitchen</span>
<span class="font-label-sm text-label-sm leading-tight">Storage</span>
</div>
<div class="bg-surface-container-lowest text-on-surface border border-surface-variant rounded-DEFAULT p-3 flex flex-col items-center justify-center text-center h-24">
<span class="material-symbols-outlined mb-1 text-on-surface-variant" data-icon="flatware">flatware</span>
<span class="font-label-sm text-label-sm leading-tight">Utensils</span>
</div>
<div class="bg-surface-container-lowest text-on-surface border border-surface-variant rounded-DEFAULT p-3 flex flex-col items-center justify-center text-center h-24">
<span class="material-symbols-outlined mb-1 text-on-surface-variant" data-icon="restaurant">restaurant</span>
<span class="font-label-sm text-label-sm leading-tight">Dining</span>
</div>
</div>
</section>
<!-- Divider Block -->
<div class="h-2 bg-[#F5F5F5] -mx-margin-mobile mb-lg"></div>
<!-- Categories: Accessories (Visual Distinction) -->
<section class="mb-lg">
<h2 class="text-body-lg font-body-lg font-semibold mb-md text-on-surface-variant">Accessories &amp; Parts</h2>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 bg-surface-container-low text-on-surface rounded-full font-body-md text-body-md border border-transparent">Filters &amp; Bags</button>
<button class="px-4 py-2 bg-surface-container-low text-on-surface rounded-full font-body-md text-body-md border border-transparent">Blades</button>
<button class="px-4 py-2 bg-surface-container-low text-on-surface rounded-full font-body-md text-body-md border border-transparent">Cords</button>

<button class="px-4 py-2 bg-surface-container-low text-on-surface rounded-full font-body-md text-body-md border border-transparent">Cleaning Kits</button>

</section>

<div class="h-2 bg-[#F5F5F5] -mx-margin-mobile mb-lg"></div>

<div class="flex items-center gap-sm">
<div class="flex-1 relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md">$</span>
<input class="w-full bg-surface-container-low border-none rounded-DEFAULT py-2 pl-6 pr-3 font-body-md text-body-md focus:ring-1 focus:ring-primary" placeholder="Min" type="number"/>
</div>
<div class="w-4 h-[1px] bg-surface-variant"></div>
<div class="flex-1 relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant font-body-md">$</span>
<input class="w-full bg-surface-container-low border-none rounded-DEFAULT py-2 pl-6 pr-3 font-body-md text-body-md focus:ring-1 focus:ring-primary" placeholder="Max" type="number"/>
</div>
</div>

<div class="flex gap-2 mt-sm">
<button class="flex-1 py-1.5 bg-surface-container-lowest text-on-surface text-label-sm font-label-sm border border-surface-variant rounded-DEFAULT text-center">Under $25</button>
<button class="flex-1 py-1.5 bg-surface-container-lowest text-on-surface text-label-sm font-label-sm border border-surface-variant rounded-DEFAULT text-center">$25 - $50</button>
<button class="flex-1 py-1.5 bg-surface-container-lowest text-on-surface text-label-sm font-label-sm border border-surface-variant rounded-DEFAULT text-center">Over $50</button>
</div>

<div class="h-2 bg-[#F5F5F5] -mx-margin-mobile mb-lg"></div>

<button class="w-full flex items-center justify-between py-3 text-on-surface">

<span class="material-symbols-outlined text-on-surface-variant" data-icon="expand_more">expand_more</span>
</button>
<button class="w-full flex items-center justify-between py-3 border-t border-surface-variant text-on-surface">
<span class="text-body-lg font-body-lg font-semibold">Rating</span>
<span class="flex items-center gap-1 text-body-md text-primary">

</span>

</div>
<button class="flex-1 bg-primary text-white font-h3 text-h3 py-3 rounded-DEFAULT shadow-[0_4px_10px_rgba(178,34,4,0.2)] active:bg-surface-tint transition-colors">
